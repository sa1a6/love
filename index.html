<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Symphony for Marami ✨</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Amiri:ital,wght@0,400;1,700&family=Cairo:wght@400;700;900&display=swap" rel="stylesheet">
    
    <style>
        :root { 
            --accent: #ff1453; 
            --gold: #d4af37; 
            --glass: rgba(255, 255, 255, 0.05);
        }
        
        body { 
            margin: 0; 
            overflow: hidden; 
            background: #000; 
            font-family: 'Amiri', serif; 
            user-select: none;
            -webkit-tap-highlight-color: transparent;
        }

        /* حاوية الخلفية */
        #canvas-container {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: 1;
        }
        
        /* واجهة البداية الفخمة */
        .overlay { 
            position: fixed; inset: 0; 
            background: radial-gradient(circle at center, #1a050a 0%, #000 100%); 
            display: flex; justify-content: center; align-items: center; flex-direction: column; 
            z-index: 100; transition: all 1.5s cubic-bezier(0.65, 0, 0.35, 1);
        }

        .glass-card {
            background: var(--glass);
            backdrop-filter: blur(20px);
            padding: 50px 80px;
            border-radius: 30px;
            border: 1px solid rgba(255, 215, 0, 0.1);
            text-align: center;
            box-shadow: 0 25px 50px rgba(0,0,0,0.5);
        }

        .title { 
            color: #fff; font-size: 2.8rem; margin-bottom: 35px; 
            font-weight: 700; text-shadow: 0 0 20px var(--accent);
            letter-spacing: 1px;
        }
        
        button { 
            padding: 16px 55px; font-size: 1.3rem; color: #fff; 
            background: linear-gradient(135deg, #ff1453 0%, #800a29 100%);
            border: none; border-radius: 100px; cursor: pointer; 
            transition: 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            font-family: 'Cairo', sans-serif; font-weight: 700;
            box-shadow: 0 10px 20px rgba(255, 20, 83, 0.3);
            border: 1px solid rgba(255,255,255,0.1);
        }
        
        button:hover { 
            transform: scale(1.1); box-shadow: 0 15px 40px var(--accent); 
        }

        /* تلميح النقر */
        #hint { 
            position: absolute; bottom: 10%; left: 50%; transform: translateX(-50%); 
            color: rgba(255, 255, 255, 0.6); font-family: 'Cairo', sans-serif;
            font-size: 1.1rem; opacity: 0; transition: 1s; z-index: 10;
        }

        /* الاسم الملكي */
        #love-name { 
            position: absolute; top: 50%; left: 50%; 
            transform: translate(-50%, -50%) scale(0.5); 
            color: #fff; font-family: 'Cairo', sans-serif;
            font-size: clamp(4rem, 15vw, 12rem); font-weight: 900;
            opacity: 0; transition: all 4s cubic-bezier(0.075, 0.82, 0.165, 1); 
            text-shadow: 0 0 30px var(--accent), 0 0 90px var(--accent), 0 10px 20px rgba(0,0,0,0.8); 
            z-index: 5; filter: blur(30px); letter-spacing: -2px;
        }
        
        #love-name.active { 
            opacity: 1; transform: translate(-50%, -50%) scale(1); filter: blur(0px);
        }

        .hide { opacity: 0 !important; pointer-events: none !important; }
        .show { opacity: 1 !important; }
    </style>
</head>
<body>

<div id="canvas-container"></div>

<div class="overlay" id="launcher">
    <div class="glass-card">
        <div class="title">لكِ وحدكِ 🌸</div>
        <button onclick="ignite()">ابدأ الحكاية</button>
    </div>
</div>

<div id="hint">✨ المس الصندوق لتكتشف ما بداخله ✨</div>
<div id="love-name">مرامي</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/tween.js/18.6.4/tween.umd.js"></script>

<script>
    let scene, camera, renderer, gift, heart, stars, clock;
    let isOpened = false;
    let active = false;

    function ignite() {
        document.getElementById('launcher').classList.add('hide');
        setTimeout(() => {
            document.getElementById('hint').classList.add('show');
            active = true;
        }, 1500);
        init();
    }

    function init() {
        scene = new THREE.Scene();
        clock = new THREE.Clock();
        camera = new THREE.PerspectiveCamera(40, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.set(0, 5, 25);

        renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(window.devicePixelRatio);
        renderer.toneMapping = THREE.ReinhardToneMapping;
        document.getElementById('canvas-container').appendChild(renderer.domElement);

        // إضاءة احترافية
        scene.add(new THREE.AmbientLight(0xffffff, 0.5));
        const mainLight = new THREE.PointLight(0xff1453, 2, 50);
        mainLight.position.set(10, 10, 10);
        scene.add(mainLight);

        createGift();
        createHeart();
        createNebula();

        window.addEventListener('mousedown', onAction);
        window.addEventListener('touchstart', (e) => onAction(e.touches[0]));
        animate();
    }

    function createGift() {
        gift = new THREE.Group();
        
        // المادة المخملية للصندوق
        const bodyMat = new THREE.MeshPhysicalMaterial({ 
            color: 0x800a29, roughness: 0.4, metalness: 0.1, clearcoat: 0.5 
        });
        
        // المادة الذهبية للأشرطة
        const goldMat = new THREE.MeshPhysicalMaterial({ 
            color: 0xd4af37, metalness: 1, roughness: 0.1 
        });

        const body = new THREE.Mesh(new THREE.BoxGeometry(5, 5, 5), bodyMat);
        body.position.y = 2.5;
        gift.add(body);

        const lidGroup = new THREE.Group();
        const lidBase = new THREE.Mesh(new THREE.BoxGeometry(5.6, 1.2, 5.6), bodyMat);
        lidBase.position.y = 5.6;
        lidGroup.add(lidBase);
        
        // إضافة شريط ذهبي متقاطع
        const ribbonV = new THREE.Mesh(new THREE.BoxGeometry(1.2, 5.2, 5.2), goldMat);
        ribbonV.position.y = 2.5; gift.add(ribbonV);
        
        const ribbonH = new THREE.Mesh(new THREE.BoxGeometry(5.2, 5.2, 1.2), goldMat);
        ribbonH.position.y = 2.5; gift.add(ribbonH);

        gift.add(lidGroup);
        gift.userData.lid = lidGroup;
        scene.add(gift);
    }

    function createHeart() {
        heart = new THREE.Group();
        const shape = new THREE.Shape();
        shape.moveTo(25, 25);
        shape.bezierCurveTo(25, 25, 20, 0, 0, 0);
        shape.bezierCurveTo(-30, 0, -30, 35, -30, 35);
        shape.bezierCurveTo(-30, 55, -10, 77, 25, 95);
        shape.bezierCurveTo(60, 77, 80, 55, 80, 35);
        shape.bezierCurveTo(80, 35, 80, 0, 50, 0);
        shape.bezierCurveTo(35, 0, 25, 25, 25, 25);

        const geo = new THREE.ExtrudeGeometry(shape, { depth: 10, bevelEnabled: true, bevelSize: 4 });
        geo.center();
        const mat = new THREE.MeshPhysicalMaterial({ 
            color: 0xffffff, emissive: 0xff1453, emissiveIntensity: 1, 
            roughness: 0, metalness: 0.5, transmission: 0.8, thickness: 2
        });
        const mesh = new THREE.Mesh(geo, mat);
        mesh.rotation.x = Math.PI; mesh.scale.set(0.025, 0.025, 0.025);
        heart.add(mesh);
        heart.visible = false;
        scene.add(heart);
    }

    function createNebula() {
        const geo = new THREE.BufferGeometry();
        const pts = [];
        for(let i=0; i<1500; i++) {
            pts.push((Math.random()-0.5)*100, (Math.random()-0.5)*100, (Math.random()-0.5)*100);
        }
        geo.setAttribute('position', new THREE.Float32BufferAttribute(pts, 3));
        const mat = new THREE.PointsMaterial({ size: 0.1, color: 0xff1453, transparent: true, opacity: 0.6 });
        stars = new THREE.Points(geo, mat);
        scene.add(stars);
    }

    function onAction(e) {
        if(!active || isOpened) return;
        const mouse = new THREE.Vector2(
            (e.clientX / window.innerWidth) * 2 - 1,
            -(e.clientY / window.innerHeight) * 2 + 1
        );
        const ray = new THREE.Raycaster();
        ray.setFromCamera(mouse, camera);
        if(ray.intersectObjects(gift.children).length > 0) openAction();
    }

    function openAction() {
        isOpened = true;
        document.getElementById('hint').classList.remove('show');
        
        // حركة الكاميرا للتقريب
        new TWEEN.Tween(camera.position).to({ z: 15, y: 2 }, 1500).easing(TWEEN.Easing.Cubic.InOut).start();

        // فتح الغطاء
        new TWEEN.Tween(gift.userData.lid.position).to({ y: 15, z: -10 }, 1500).easing(TWEEN.Easing.Back.Out).start();
        new TWEEN.Tween(gift.userData.lid.rotation).to({ x: -1 }, 1000).start();
        
        // تلاشي الصندوق
        new TWEEN.Tween(gift.scale).to({ x: 0, y: 0, z: 0 }, 1000).delay(500).easing(TWEEN.Easing.Back.In).start();

        setTimeout(() => {
            heart.visible = true;
            heart.scale.set(0, 0, 0);
            new TWEEN.Tween(heart.scale).to({ x: 1, y: 1, z: 1 }, 2000).easing(TWEEN.Easing.Elastic.Out).start();
            document.getElementById('love-name').classList.add('active');
        }, 1200);
    }

    function animate() {
        requestAnimationFrame(animate);
        TWEEN.update();
        const time = clock.getElapsedTime();
        
        if(gift && !isOpened) {
            gift.rotation.y += 0.005;
            gift.position.y = Math.sin(time) * 0.5;
        }
        if(heart && isOpened) {
            heart.rotation.y = Math.sin(time * 0.5) * 0.5;
            heart.position.y = Math.sin(time * 2) * 0.4;
            heart.scale.multiplyScalar(1 + Math.sin(time*5)*0.002);
        }
        if(stars) stars.rotation.y += 0.001;
        
        renderer.render(scene, camera);
    }

    window.addEventListener('resize', () => {
        camera.aspect = window.innerWidth / window.innerHeight;
        camera.updateProjectionMatrix();
        renderer.setSize(window.innerWidth, window.innerHeight);
    });
</script>
</body>
</html>
